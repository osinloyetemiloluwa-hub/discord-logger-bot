# Render Blueprint - Discord Logger Bot

databases:
  - name: discord-logs-db
    plan: free
    databaseName: discord_logs

services:
  - type: worker
    name: discord-bot
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString

  - type: web
    name: discord-api
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: discord-logs-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"
